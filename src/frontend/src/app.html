<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a1030" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="description" content="DOCCUM — Certifica la existencia de archivos y textos con SHA-256 y marca de tiempo de servidor. Privacidad by design: no se almacena el contenido original." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="DOCCUM — Certificación criptográfica de documentos" />

    <meta property="og:url" content="https://doccum.com" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="DOCCUM" />
    <meta name="twitter:description" content="Certificación criptográfica de documentos. SHA-256 + timestamp. Sin cookies." />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
