services:
  backend:
    build:
      context: ..
      dockerfile: infra/containers/Containerfile.backend
    ports:
      - "${BACKEND_PORT:-3001}:3000"
    environment:
      - PORT=3000
      - DB_PATH=/data/doccum.db
    volumes:
      - backend-data:/data

  frontend:
    build:
      context: ..
      dockerfile: infra/containers/Containerfile.frontend
      args:
        VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-3001}
    ports:
      - "${FRONTEND_PORT:-4174}:4173"
    environment:
      - ORIGIN=http://localhost:${FRONTEND_PORT:-4174}
      - VITE_API_BASE_URL=http://localhost:${BACKEND_PORT:-3001}
    depends_on:
      - backend

  analytics:
    build:
      context: ..
      dockerfile: infra/containers/Containerfile.analytics
    ports:
      - "${ANALYTICS_PORT:-8080}:8080"
    environment:
      - GOATCOUNTER_VHOST=localhost:${ANALYTICS_PORT:-8080}
      - GOATCOUNTER_EMAIL=${GOATCOUNTER_EMAIL:-admin@doccum.com}
      - GOATCOUNTER_PASSWORD=${GOATCOUNTER_PASSWORD:-changeme}
    volumes:
      - analytics-data:/data

volumes:
  backend-data:
  analytics-data:

