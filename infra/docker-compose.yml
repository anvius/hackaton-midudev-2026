services:
  backend:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.backend
    ports:
      - "${BACKEND_PORT:-3001}:3000"
    environment:
      - PORT=3000
      - DB_PATH=/data/doccum.db
    volumes:
      - backend-data:/data

  frontend:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.frontend
      args:
        VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-3001}
    ports:
      - "${FRONTEND_PORT:-4174}:4173"
    environment:
      - ORIGIN=http://localhost:${FRONTEND_PORT:-4174}
      - VITE_API_BASE_URL=http://localhost:${BACKEND_PORT:-3001}
    depends_on:
      - backend

volumes:
  backend-data:

