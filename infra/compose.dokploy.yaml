# Dokploy deployment: create a "Docker Compose" project, point it to
# the Git repo and set Compose Path to "infra/compose.dokploy.yaml".
# Dokploy clones the repo and runs `docker compose build` on the server
# — no registry needed, images are built from source.
#
# Required env vars in Dokploy project settings:
#   GOATCOUNTER_EMAIL, GOATCOUNTER_PASSWORD
#
# Replace doccum.com / api.doccum.com / stats.doccum.com with your domain.

services:
  doccum-backend:
    build:
      context: ..
      dockerfile: infra/containers/Containerfile.backend
    environment:
      - PORT=3000
      - DB_PATH=/data/doccum.db
    volumes:
      - doccum-backend-data:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.doccum-backend.rule=Host(`api.doccum.com`)
      - traefik.http.routers.doccum-backend.entrypoints=websecure
      - traefik.http.routers.doccum-backend.tls.certresolver=letsencrypt
      - traefik.http.services.doccum-backend.loadbalancer.server.port=3000

  doccum-frontend:
    build:
      context: ..
      dockerfile: infra/containers/Containerfile.frontend
      args:
        VITE_API_BASE_URL: https://api.doccum.com
    environment:
      - HOST=0.0.0.0
      - PORT=4173
      - ORIGIN=https://doccum.com
    depends_on:
      - doccum-backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.doccum-frontend.rule=Host(`doccum.com`)
      - traefik.http.routers.doccum-frontend.entrypoints=websecure
      - traefik.http.routers.doccum-frontend.tls.certresolver=letsencrypt
      - traefik.http.services.doccum-frontend.loadbalancer.server.port=4173

  doccum-analytics:
    build:
      context: ..
      dockerfile: infra/containers/Containerfile.analytics
    environment:
      - GOATCOUNTER_VHOST=stats.doccum.com
      - GOATCOUNTER_EMAIL=${GOATCOUNTER_EMAIL:-admin@doccum.com}
      - GOATCOUNTER_PASSWORD=${GOATCOUNTER_PASSWORD:-changeme}
    volumes:
      - doccum-analytics-data:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.doccum-analytics.rule=Host(`stats.doccum.com`)
      - traefik.http.routers.doccum-analytics.entrypoints=websecure
      - traefik.http.routers.doccum-analytics.tls.certresolver=letsencrypt
      - traefik.http.services.doccum-analytics.loadbalancer.server.port=8080

volumes:
  doccum-backend-data:
  doccum-analytics-data:
