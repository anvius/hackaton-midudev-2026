name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    name: Backend — Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: src/backend
      - name: Run tests
        run: bun test
        working-directory: src/backend

  backend-lint:
    name: Backend — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: src/backend
      - name: Lint
        run: bun run lint
        working-directory: src/backend

  frontend-check:
    name: Frontend — Type check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: src/frontend
      - name: Type check
        run: bun run check
        working-directory: src/frontend
      - name: Build
        run: bun run build
        working-directory: src/frontend
        env:
          VITE_API_BASE_URL: http://localhost:3000

  frontend-lint:
    name: Frontend — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: src/frontend
      - name: Lint
        run: bun run lint
        working-directory: src/frontend
